name: stream_video
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5
  cupertino_icons: ^1.0.8
  gal: ^2.3.0
  http: ^1.2.2
  # bản đồ
  flutter_map: ^8.2.2
